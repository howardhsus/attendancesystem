<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Referrer-Policy" content="No-referrer-when-downgrade" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none';script-src 'self';style-src 'self';img-src 'self' data:;font-src 'self';connect-src 'self' https://script.google.com https://script.googleusercontent.com;form-action 'none';base-uri 'none';frame-src 'none';object-src 'none';frame-ancestors 'none';">
    <title>Taipei 101 Smart Service Reporting System</title>
    <link rel="stylesheet" href="static/css/main.css">
</head>
<body>
    <div class="app-container">
        <div id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading system settings...</div>
        </div>

        <header class="app-header">
            <div class="logo" id="reloadLogo">
                <div class="logo-icon">
                    <img src="static/pic/logo.png" alt="Logo">
                </div>
            </div>
            <div class="report-label">
                繁體中文
            </div>
        </header>

        <main class="chat-container" id="chatContainer">
        </main>

        <footer class="input-area-padding">
        </footer>
    </div>

    <div class="modal" id="imageModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">📷 Photo Preview</div>
                <button class="modal-close" id="closeImageModalBtn">×</button>
            </div>
            <div class="modal-body">
                <img id="modalImage" src="" alt="">
            </div>
        </div>
    </div>

    <div class="modal" id="floorModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="floorModalTitle">Select Floor</div>
                <button class="modal-close" id="closeFloorModalBtn">×</button>
            </div>
            <div class="modal-body">
                <div class="floor-options" id="floorOptions"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="locationModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="locationModalTitle">Select Location</div>
                <button class="modal-close" id="closeLocationModalBtn">×</button>
            </div>
            <div class="modal-body">
                <div class="location-options" id="locationOptions"></div>
            </div>
        </div>
    </div>

    <script src="static/js/mainEN.js"></script>
</body>
</html>
